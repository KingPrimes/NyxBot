#是否调试模式
test:
  isTest: true
jwt:
  expiration: 360
  secret: 8HcUOOhNGddRKMqe6UXXhJy7bo4ktHUHrdshmgq8y7I=


spring:
  profiles:
    active: dev
  main:
    allow-circular-references: true
  thymeleaf:
    mode: HTML
    encoding: UTF-8
    cache: false
    template-resolver-order: 0
    suffix: .html

  # 资源信息
  messages:
    # 国际化资源文件路径
    basename: i18n/messages
    encoding: UTF-8
    fallback-to-system-locale: false

  #定时任务
  task:
    execution:
      pool:
        core-size: 0
        keep-alive: 10s
        max-size: 1
        queue-capacity: 1
    scheduling:
      shutdown:
        await-termination: false

  #数据源配置
  datasource:
    driver-class-name: org.h2.Driver
    username: sa
    password: sa
    #设置数据源；MODE=MySQL 可以解析MySQL形式的SQL语句
    url: jdbc:h2:file:./data/H2;MODE=MySQL;AUTO_SERVER=TRUE;PAGE_SIZE=16
  #H2
  h2:
    console:
      enabled: true
  #JPA
  jpa:
    show-sql: false
    hibernate:
      ddl-auto: update
    open-in-view: false

  #缓存设置
  cache:
    type: cache2k

  output:
    ansi:
      enabled: detect

  lifecycle:
    timeout-per-shutdown-phase: 10s

# OneBot
shiro:
  ws:
    server:
      url: /ws/shiro
      enable: true
    client:
      enable: false
      url: ws://localhost:3001
      reconnect-interval: 5000
    access-token: 123456aaa
  debug: false
server:
  port: 8080
  shutdown: graceful
logging:
  level:
    com.nyx.bot: DEBUG
    com.mikuac.shiro: INFO
    io.github.mymonstercat: OFF
    org.xhtmlrenderer: OFF
    org.xnio.listener: OFF
    org.springframework.security.web.DefaultSecurityFilterChain: OFF