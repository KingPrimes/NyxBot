#是否调试模式
test:
  isTest: false
jwt:
  expiration: 3600
  secret: @JWT_SECRET@


spring:
  profiles:
    active: server
  main:
    allow-circular-references: true
  thymeleaf:
    mode: HTML
    encoding: UTF-8
    cache: false
    template-resolver-order: 0
    suffix: .html

  # 资源信息
  messages:
    # 国际化资源文件路径
    basename: i18n/messages
    encoding: UTF-8
    fallback-to-system-locale: false

  #默认 @Async 执行器已缩至最小（实际均使用 @Async("taskExecutor") 虚拟线程）
  task:
    execution:
      pool:
        core-size: 0
        max-size: 1
        keep-alive: 10s
        queue-capacity: 1
    scheduling:
      shutdown:
        await-termination: false

  #数据源配置
  datasource:
    driver-class-name: org.h2.Driver
    username: @USERNAME@
    password: @PASSWORD@
    #设置数据源；MODE=MySQL 可以解析MySQL形式的SQL语句
    # DB_CLOSE_DELAY=5：最后连接关闭后延迟5秒再关闭DB，避免重启时文件锁残留
    # FILE_LOCK=SOCKET：使用socket锁替代文件锁，释放更快
    url: jdbc:h2:file:./data/H2;MODE=MySQL;AUTO_SERVER=TRUE;PAGE_SIZE=16;DB_CLOSE_DELAY=5;FILE_LOCK=SOCKET
    hikari:
      # 2核服务器建议 maximum-pool-size 3-5，避免连接池过大导致虚拟线程平台线程饥饿
      maximum-pool-size: 3
      minimum-idle: 1
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      # 泄漏检测阈值 2min，避免网络慢误报
      leak-detection-threshold: 120000
  #H2
  h2:
    console:
      enabled: false
  #JPA
  jpa:
    show-sql: false
    hibernate:
      ddl-auto: update
    open-in-view: false

  #缓存设置
  cache:
    type: cache2k

  output:
    ansi:
      enabled: detect

  lifecycle:
    # 延长优雅关闭超时，确保 H2 数据库有足够时间刷盘
    timeout-per-shutdown-phase: 30s

# Warframe 模块配置
warframe:
  notification:
    history:
      # 通知历史记录保留时长（小时）
      # 默认 12 小时，超过此时间的记录将被自动清理
      # 建议不少于 12 小时，以确保周期性任务的防重复机制有效
      retention-hours: 12

# 系统模块配置
system:
  log:
    # 操作日志保留天数，超过此天数的 LogInfo 记录将被定时清理（每天 3:30）
    # 防止日志表无限增长导致 H2 文件膨胀、内存占用持续升高
    retention-days: 7

# OneBot
shiro:
  ws:
    server:
      url: /ws/shiro
      enable: true
    client:
      enable: false
      url: ws://localhost:3001
      reconnect-interval: 5000
  debug: false
server:
  port: 8080
  shutdown: graceful
logging:
  level:
    com.nyx.bot: INFO
    com.mikuac.shiro: INFO
    org.hibernate.SQL: INFO
    org.springframework: INFO
    org.springframework.web.servlet: INFO
    org.springframework.web.socket: INFO
    org.springframework.boot.autoconfigure.logging: INFO
    io.github.mymonstercat: OFF
    org.xhtmlrenderer: OFF
    org.xnio.listener: OFF
    org.springframework.security.web.DefaultSecurityFilterChain: OFF
