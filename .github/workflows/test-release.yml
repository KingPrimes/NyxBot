name: Test Build Release

on:
  workflow_dispatch:
    inputs:
      branch:
        description: '要构建的分支'
        required: true
        default: 'main'
        type: string
      logLevel:
        description: 'Log level'
        required: true
        default: 'info'
        type: choice
        options:
          - debug
          - info
          - warning
          - error
jobs:
  build-release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }}
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: pnpm-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: pnpm-${{ runner.os }}-

      - name: Clone NyxBot-WebUI repository
        run: git clone https://github.com/KingPrimes/NyxBot-WebUI.git

      - name: Build NyxBot-WebUI with pnpm
        working-directory: ./NyxBot-WebUI
        run: |
          pnpm install --frozen-lockfile
          pnpm build

      - name: Cache WebUI build output
        uses: actions/cache@v4
        with:
          path: |
            NyxBot-WebUI/resources
            NyxBot-WebUI/node_modules
          key: webui-${{ runner.os }}-${{ hashFiles('NyxBot-WebUI/src/**', 'NyxBot-WebUI/pnpm-lock.yaml') }}
          restore-keys: webui-${{ runner.os }}-

      - name: Merge built resources into current project
        run: |
          mkdir -p src/main/resources/webui
          cp -r NyxBot-WebUI/resources/* src/main/resources/

      - name: Build with Maven
        run: |
          JWT_SECRET=$(openssl rand -base64 32 | tr -d '\n')
          echo "::add-mask::$JWT_SECRET"
          mvn clean package -DUSERNAME=nyxbot -DPASSWORD=nyxbot -DJWT_SECRET="$JWT_SECRET" -Dorg.slf4j.simpleLogger.defaultLogLevel=${{ inputs.logLevel }}

      - name: Upload App To Artifact
        uses: actions/upload-artifact@v4
        with:
          name: kingprimes.top
          path: target/NyxBot.jar
          if-no-files-found: warn
          retention-days: 30
          compression-level: 6
          overwrite: true