# This workflow will build a package using Maven and then publish it to GitHub packages when a release is created
# For more information see: https://github.com/actions/setup-java/blob/main/docs/advanced-usage.md#apache-maven-with-a-settings-path
# optional
name: Build For Release

on:
  push:
    tags:
      - v*
jobs:
  build-release:
    name: Release
    runs-on: ubuntu-latest
    env:
      USERNAME: ${{ secrets.USERNAME }}
      PASSWORD: ${{ secrets.PASSWORD }}
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '22.x'

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: pnpm-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: pnpm-${{ runner.os }}-

      - name: Clone NyxBot-WebUI repository
        run: git clone https://github.com/KingPrimes/NyxBot-WebUI.git

      - name: Build NyxBot-WebUI with pnpm
        working-directory: ./NyxBot-WebUI
        run: |
          pnpm install --frozen-lockfile
          pnpm build

      - name: Cache WebUI build output
        uses: actions/cache@v4
        with:
          path: |
            NyxBot-WebUI/resources
            NyxBot-WebUI/node_modules
          key: webui-${{ runner.os }}-${{ hashFiles('NyxBot-WebUI/src/**', 'NyxBot-WebUI/pnpm-lock.yaml') }}
          restore-keys: webui-${{ runner.os }}-

      - name: Merge built resources into current project
        run: |
          mkdir -p src/main/resources/webui
          cp -r NyxBot-WebUI/resources/* src/main/resources/

      - name: Build with Maven
        run: |
          echo "::add-mask::$USERNAME"
          echo "::add-mask::$PASSWORD"
          JWT_SECRET=$(openssl rand -base64 32 | tr -d '\n')
          echo "::add-mask::$JWT_SECRET"
          mvn clean package -DUSERNAME="$USERNAME" -DPASSWORD="$PASSWORD" -DJWT_SECRET="$JWT_SECRET"
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: nyxbot-package
          path: |
            target/NyxBot.jar
            Dockerfile
            docker-compose.yml
      # 创建 GitHub Release 草稿（需手动审核后发布）
      - name: Create Release & Upload JAR
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: target/NyxBot.jar
          draft: true
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-docker:
    needs: build-release
    name: Docker
    runs-on: ubuntu-latest
    steps:
      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: nyxbot-package
          path: .  # 下载到当前目录

      - name: Set up QEMU (arm64 模拟)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        env:
          TAG: ${{ github.ref_name }}
        run: |
          # 解析版本号标签: v2.1.5 → v2.1 / v2 / latest
          VERSION="${TAG#v}"
          MINOR="${VERSION%.*}"
          MAJOR="${VERSION%%.*}"

          echo "标签: ${TAG} | 版本: ${VERSION} | v${MINOR} | v${MAJOR}"

          # 构建多架构镜像 (amd64 + arm64) 并推送全部标签
          docker buildx build --platform linux/amd64,linux/arm64 \
            --no-cache \
            --label "org.opencontainers.image.title=NyxBot" \
            --label "org.opencontainers.image.description=Warframe QQ Bot - WorldState/Market/Riven" \
            --label "org.opencontainers.image.version=${VERSION}" \
            --label "org.opencontainers.image.vendor=KingPrimes" \
            --label "org.opencontainers.image.source=https://github.com/KingPrimes/NyxBot" \
            --label "nyxbot.version=${VERSION}" \
            -t kingprimes/nyxbot:${TAG} \
            -t kingprimes/nyxbot:v${MINOR} \
            -t kingprimes/nyxbot:v${MAJOR} \
            -t kingprimes/nyxbot:latest \
            --push .

          echo "✅ 镜像已推送:"
          echo "   kingprimes/nyxbot:${TAG}"
          echo "   kingprimes/nyxbot:v${MINOR}"
          echo "   kingprimes/nyxbot:v${MAJOR}"
          echo "   kingprimes/nyxbot:latest"
          echo "   架构: amd64 + arm64"